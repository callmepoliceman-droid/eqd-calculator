<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>EQD Calculator — デザインを選ぶ</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;color:#1a1a2e;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
    background:linear-gradient(160deg,#eef2fb,#f6eefb 60%,#fff6e9);min-height:100vh;}
  .wrap{max-width:520px;margin:0 auto;padding:34px 18px 50px;}
  h1{font-size:26px;font-weight:800;margin:0 0 4px;text-align:center;}
  .sub{text-align:center;color:#5a6478;font-size:13px;margin:0 0 26px;line-height:1.6;}
  .card{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;
    border:2px solid #1f3a5f;border-radius:18px;padding:16px 16px;margin-bottom:14px;
    background:#fff;box-shadow:4px 4px 0 rgba(31,58,95,.18);transition:transform .08s;}
  .card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(31,58,95,.18);}
  .swatch{flex:0 0 auto;width:52px;height:52px;border-radius:14px;border:2px solid #1a1a2e;}
  .s-clean{background:linear-gradient(135deg,#c8d4ee,#2f6fed);}
  .s-funky{background:linear-gradient(135deg,#ff2e88,#ffd000 60%,#00e5ff);}
  .s-sanf{background:linear-gradient(135deg,#3d1860,#56247d 60%,#d9b53f);}
  .s-dark{background:linear-gradient(135deg,#0c0f14,#12171f 55%,#5eead4);}
  .t{flex:1;}
  .t b{display:block;font-size:18px;font-weight:800;}
  .t span{font-size:12px;color:#5a6478;}
  .arrow{font-size:22px;color:#1f3a5f;font-weight:800;}
  .note{margin-top:22px;font-size:11px;color:#7a7a8c;text-align:center;line-height:1.7;}
  .formula{font-family:ui-monospace,Menlo,monospace;background:#fff;border:1px solid #c9c9d6;border-radius:6px;padding:1px 6px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>EQD Calculator</h1>
  <p class="sub">放射線治療の線量分割（LQ model / BED・EQD）計算<br>使いたいデザインを選んでください</p>

  <a class="card" href="dark.html">
    <div class="swatch s-dark"></div>
    <div class="t"><b>ダーク版</b><span>洗練ダークモード</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="card" href="clean.html">
    <div class="swatch s-clean"></div>
    <div class="t"><b>クリーン版</b><span>シンプルで見やすい標準デザイン</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="card" href="sanfrecce.html">
    <div class="swatch s-sanf"></div>
    <div class="t"><b>サンフレッチェ広島版</b><span>紫＆三本の矢エンブレム</span></div>
    <div class="arrow">›</div>
  </a>

  <a class="card" href="funky.html">
    <div class="swatch s-funky"></div>
    <div class="t"><b>ファンキー版</b><span>ロードバイク散りばめポップデザイン</span></div>
    <div class="arrow">›</div>
  </a>

  <p class="note">
    LQ model：<span class="formula">BED = n·d·(1 + d/(α/β))</span><br>
    スマホはブラウザで開き「ホーム画面に追加」するとアプリ風に使えます。
  </p>
</div>
</body>
</html>
